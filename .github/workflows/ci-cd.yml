name: CI/CD Quality & Deployment Gateway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🚀 THE CRITICAL FIX: Disable workspace lookups explicitly
      - name: Setup PNPM Package Workspace
        uses: pnpm/action-setup@v4  # Upgraded to v4 for better Next.js standalone optimization
        with:
          version: 9
          run_install: false

      - name: Retrieve Node Modules Cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # 🚀 THE SECURE INSTALL FLAG: Installs standalone dependencies without workspace mode
      - name: Install Project Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Execute Quality Gate 1 - Vitest Testing Suite
        run: pnpm test:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: mock-anon-key
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: pk_test_mock_key

      - name: Execute Quality Gate 2 - TypeScript Type Check
        run: pnpm tsc --noEmit
